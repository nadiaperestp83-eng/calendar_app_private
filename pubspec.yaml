name: calendar_app
description: Calendar app for our school project.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: '>=2.19.6 <3.0.0'

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  # ⚠️ ATENÇÃO PRIVACIDADE: por padrão o google_fonts BAIXA fontes da
  # internet no primeiro uso. Para manter 100% offline, empacote as
  # fontes em assets/fonts e declare-as na seção `flutter > fonts`
  # abaixo, OU troque por uma fonte totalmente local (ex: SF Pro/Inter
  # como asset). Enquanto isso não for feito, esta dependência viola
  # a regra de "zero rede".
  google_fonts: ^4.0.4

  shared_preferences: ^2.1.1
  flutter_svg: ^2.0.6
  animations: ^2.0.7
  intl: any
  flutter_local_notifications: ^14.1.1
  timezone: ^0.9.2
  

  # --- Adicionados para a refatoração (privacidade / Isar) ---
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # --- Removido: dio (^5.1.2) ---
  # Era um cliente HTTP puro, usado apenas para chamadas de rede.
  # Contradiz a regra de "eliminar qualquer dependência de rede".
  # Se alguma tela do app original dependia de dio para buscar dados
  # do servidor (calendar_app_server), essa tela precisa ser
  # reescrita para ler do IsarService local em vez da API.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^2.0.0

  # --- Adicionados para gerar o código do Isar (evento.g.dart) ---
  build_runner: ^2.4.9
  isar_generator: ^3.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/illustrations/

  # Se optar por empacotar fontes localmente (ver aviso do google_fonts
  # acima), descomente e ajuste:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
