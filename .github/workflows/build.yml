name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze_and_test:
    name: Analisar e testar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código do Isar (evento.g.dart)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analisar (flutter analyze)
        run: flutter analyze

      - name: Rodar testes
        run: flutter test

  build_android:
    name: Build Android (APK)
    needs: analyze_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código do Isar (evento.g.dart)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Publicar artefato do APK
        uses: actions/upload-artifact@v4
        with:
          name: calendar-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
